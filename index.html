<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | ART Workspace</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./dist/css/adminlte.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      :root { --primary-gradient: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); --glass-bg: rgba(255, 255, 255, 0.85); }
      body.login-page { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%) !important; font-family: 'Prompt', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
      .login-box { width: 400px; }
      .card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); padding: 30px 15px; }
      .logo-icon { width: 64px; height: 64px; background: var(--primary-gradient); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 2rem; box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.3); }
      .login-logo { font-size: 1.5rem; margin-bottom: 35px; text-align: center; }
      .login-logo b { color: #0f172a; font-weight: 700; }
      .login-logo span { color: #0284c7; }
      .input-group { background: #f8fafc; border-radius: 12px !important; border: 1px solid #e2e8f0; margin-bottom: 15px !important; }
      .form-control { border: none !important; padding: 14px 18px !important; background: transparent !important; }
      .btn-login { background: var(--primary-gradient); border: none; border-radius: 12px; padding: 14px; color: white; font-weight: 600; width: 100%; margin-top: 10px; transition: all 0.3s ease; }
    </style>
  </head>

  <body class="login-page">
    <div class="login-box">
      <div class="card">
        <div class="card-body px-4">
          <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
          <div class="login-logo"><b>ART</b> <span>Workspace</span></div>
          <form id="loginForm">
            <div class="input-group">
              <input type="email" id="email" class="form-control" placeholder="Email Address" required />
              <div class="input-group-text"><i class="bi bi-envelope-at"></i></div>
            </div>
            <div class="input-group">
              <input type="password" id="password" class="form-control" placeholder="Password" required />
              <div class="input-group-text"><i class="bi bi-lock"></i></div>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-login mt-3">เข้าสู่ระบบ</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9m8d9h04r5MfaF1JuJwQSyABJTZABQDzUHOCQU_Q6mgiuR9xFqrjpk6nO29snPL2VCg/exec'; 

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        // กลับมาแสดงข้อความโหลดเหมือนเดิมตามคำขอ
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังตรวจสอบ...';

        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        })
        .then(res => res.json())
        .then(data => {
          if (data.result === 'success') {
            // ปรับข้อความแจ้งเตือนให้ละเอียดขึ้น
            Swal.fire({
              icon: 'success',
              title: 'เข้าสู่ระบบสำเร็จ!',
              text: 'กำลังพาท่านเข้าสู่หน้า ART Workspace',
              showConfirmButton: false,
              timer: 1000,
              timerProgressBar: true
            }).then(() => {
              window.location.href = "./dist/Dashboard.html"; 
            });
          } else {
            Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' });
            btn.disabled = false;
            btn.innerText = 'เข้าสู่ระบบ';
          }
        })
        .catch(err => {
          Swal.fire({ icon: 'warning', title: 'Error', text: 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้' });
          btn.disabled = false;
          btn.innerText = 'เข้าสู่ระบบ';
        });
      });
    </script>
  </body>
</html>
