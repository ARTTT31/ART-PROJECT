    <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="./js/adminlte.js"></script>

    <script>
      // 1. จัดการ Sidebar Scroll
      document.addEventListener('DOMContentLoaded', function () {
        const sidebarWrapper = document.querySelector('.sidebar-wrapper');
        if (sidebarWrapper && typeof OverlayScrollbarsGlobal !== 'undefined') {
          OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: { theme: 'os-theme-light', autoHide: 'leave', clickScroll: true }
          });
        }
      });

      // 2. นาฬิกา (เช็คไม่ให้คำว่า "เวลา" ซ้อนกัน)
      function updateClock() {
        const now = new Date();
        const options = { 
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        };
        const clockElement = document.getElementById('realtime-clock');
        if (clockElement) {
          let thaiTime = now.toLocaleDateString('th-TH', options);
          if (!thaiTime.includes('เวลา')) {
            thaiTime = thaiTime.replace(/(\d{2}:\d{2}:\d{2})/, 'เวลา $1');
          } else {
            thaiTime = thaiTime.replace(/เวลา\s+เวลา/, 'เวลา'); // กันบั๊กซ้อน
          }
          clockElement.textContent = thaiTime;
        }
      }
      setInterval(updateClock, 1000);
      updateClock();

      // 3. ฟังก์ชันออกจากระบบ (Logout)
      document.getElementById('logoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        Swal.fire({
          title: 'ยืนยันการออกจากระบบ ?',
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#3085d6',
          confirmButtonText: 'ใช่, ออกจากระบบ',
          cancelButtonText: 'ยกเลิก'
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire({
              title: 'สำเร็จ!',
              text: 'กำลังพากลับไปหน้า Login',
              icon: 'success',
              timer: 1000,
              showConfirmButton: false
            }).then(() => {
              window.location.href = "../pages/login.html"; 
            });
          }
        });
      });
    </script>
