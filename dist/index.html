    <script>
      // 1. จัดการเวลา Real-time
      function updateClock() {
        const now = new Date();
        const options = {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        };
        const clockElement = document.getElementById('realtime-clock');
        if (clockElement) {
          let thaiTime = now.toLocaleDateString('th-TH', options);
          if (!thaiTime.includes('เวลา'))
            thaiTime = thaiTime.replace(/(\d{2}:\d{2}:\d{2})/, 'เวลา $1');
          clockElement.textContent = thaiTime;
        }
      }
      setInterval(updateClock, 1000);
      updateClock();

      // 2. ระบบออกจากระบบ
      document.getElementById('logoutBtn').addEventListener('click', function (e) {
        e.preventDefault();
        Swal.fire({
          title: 'ยืนยันการออกจากระบบ ?',
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: 'ใช่, ออกจากระบบ',
          cancelButtonText: 'ยกเลิก',
        }).then((result) => {
          if (result.isConfirmed) {
            sessionStorage.clear();
            Swal.fire({
              title: 'สำเร็จ!',
              text: 'กำลังกลับไปที่หน้า Login',
              icon: 'success',
              timer: 1500,
              showConfirmButton: false,
            }).then(() => {
              window.location.href = '../';
            });
          }
        });
      });

      // 3. ปรับแต่ง OverlayScrollbars สำหรับ Sidebar
      const sidebarWrapper = document.querySelector('.sidebar-wrapper');
      if (sidebarWrapper) {
        OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
          scrollbars: {
            theme: 'os-theme-light',
            autoHide: 'leave',
            clickScroll: true,
          },
        });
      }
    </script>
